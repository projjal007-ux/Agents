name: Daily AI News

on:
  schedule:
    # 01:30 UTC = 07:00 IST
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Daily AI News script
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: atnew.ai@gmail.com
          EMAIL_TO: projjal007@gmail.com,projwal20@gmail.com,kalyan.halder12@gmail.com
        run: python Agents/DailyAINews/dailyAINews.py
